<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      text-align: center;
      max-width: 600px;
      padding: 40px 24px;
    }
    h1 {
      font-size: 56px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>The page you were looking for doesn’t exist or you don’t have access to it.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
