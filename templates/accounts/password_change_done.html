{% extends "base.html" %}{% load static %}
{% block extra_head %}
  <title>Password Updated</title>
  <link rel="stylesheet" href="/static/css/password_reset_confirm.css">
{% endblock %}
{% block hero %}{% endblock %}
</head>
{% block content %}
  <div class="pw-standalone">
    <div class="pw-wrap">
      <header class="pw-head">
        <h1>Password Updated</h1>
        <p>Your password has been changed successfully.</p>
      </header>

      <div class="card">
        <p style="color: white;">You’re all set. Your account password has been updated.</p>
      </div>

      <div class="actions">
        <a href="{% url 'control:pages_cp:artist_dashboard' artist.id %}" class="btn primary">Continue</a>
      </div>
    </div>
  </div>
{% endblock %}
